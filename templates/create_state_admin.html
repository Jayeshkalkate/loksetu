{% load static %}
{% include "header.html" %}

<div class="container">

<h2>Create State Admin</h2>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<form method="post">

{% csrf_token %}

<label>Username</label>
<input type="text" name="username" required>

<label>Email</label>
<input type="email" name="email">

<label>Password</label>
<input type="password" name="password" required>

<button type="submit">Create State Admin</button>

</form>

</div>

{% include "footer.html" %}
