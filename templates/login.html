{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login - LokSetu Complaint Portal</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <script
      src="https://kit.fontawesome.com/a076d05399.js"
      crossorigin="anonymous"
    ></script>
    
    <link
      rel="stylesheet"
      href="{% static 'css/login.css' %}"
      type="text/css"
    />

  </head>

  <body>
    <div class="wrapper">
      <h2>LokSetu Login</h2>

      <div class="portal-title">Smart Public Complaint Tracker</div>

      {% if messages %} {% for message in messages %}
      <div class="error-message">{{ message }}</div>
      {% endfor %} {% endif %}

      <form method="POST" action="{% url 'login' %}" id="login-form">
        {% csrf_token %}

        <div
          id="frontend-error"
          class="validation-error"
          style="display: none"
        ></div>

        <div class="input-field">
          <i class="fas fa-user"></i>

          <input type="text" name="username" id="username" required autofocus />

          <label>Username</label>
        </div>

        <div class="input-field">
          <i class="fas fa-lock"></i>

          <input type="password" name="password" id="password" required />

          <label>Password</label>
        </div>

        <div class="show-password">
          <input type="checkbox" id="toggle-password" />

          <label for="toggle-password">Show Password</label>
        </div>

        <button type="submit" id="login-button">
          Login

          <span class="spinner" id="spinner"></span>
        </button>

        <div class="link-group">
          <a href="{% url 'password_reset_form' %}">Forgot Password?</a>
        </div>
      </form>

      <div class="register">
        Don’t have an account?

        <a href="{% url 'register' %}">Register as Citizen</a>
      </div>
    </div>

    <script>
      const form = document.getElementById("login-form");

      const button = document.getElementById("login-button");

      const spinner = document.getElementById("spinner");

      const username = document.getElementById("username");

      const password = document.getElementById("password");

      const togglePassword = document.getElementById("toggle-password");

      const errorDiv = document.getElementById("frontend-error");

      togglePassword.addEventListener("change", () => {
        password.type = togglePassword.checked ? "text" : "password";
      });

      form.addEventListener("submit", function (e) {
        errorDiv.style.display = "none";

        if (!username.value.trim() || !password.value.trim()) {
          e.preventDefault();

          errorDiv.innerText = "Username and Password are required.";

          errorDiv.style.display = "block";

          return;
        }

        button.disabled = true;

        spinner.style.display = "inline-block";
      });
    </script>
  </body>
</html>
